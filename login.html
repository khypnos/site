<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khypnos — Connexion</title>
    <meta name="description" content="Connecte-toi à ton espace étudiant Khypnos pour accéder à ta formation EVC Anesthésie-Réanimation.">
    <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" sizes="any">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/css/theme-elegance.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="container">
    <main class="login-wrapper">
        <section class="login-card" aria-labelledby="login-title">
            <div class="lock-badge" aria-hidden="true">🔒</div>
            <h1 id="login-title">Accès espace étudiant</h1>
            <p class="subtitle">Connecte-toi pour accéder à ta formation Khypnos.</p>

            <!-- ─── VUE LOGIN ─── -->
            <div id="view-login" class="active">
                <form id="login-form" novalidate>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input id="email" type="email" placeholder="ton@email.fr" autocomplete="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Mot de passe</label>
                        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
                    </div>
                    <div id="login-message" class="form-message" role="alert" aria-live="polite"></div>
                    <button id="btn-login" class="btn-submit" type="submit">Se connecter</button>
                </form>
                <div class="login-footer">
                    <a href="#" id="link-forgot">Mot de passe oublié ?</a>
                </div>
                <p class="login-footnote">Besoin d'aide ? <a href="mailto:contact@khypnos.fr">contact@khypnos.fr</a></p>
            </div>

            <!-- ─── VUE RESET PASSWORD ─── -->
            <div id="view-reset">
                <p class="reset-intro">
                    Saisis ton adresse email, tu recevras un lien pour réinitialiser ton mot de passe.
                </p>
                <form id="reset-form" novalidate>
                    <div class="form-group">
                        <label for="reset-email">Email</label>
                        <input id="reset-email" type="email" placeholder="ton@email.fr" autocomplete="email" required>
                    </div>
                    <div id="reset-message" class="form-message" role="alert" aria-live="polite"></div>
                    <button id="btn-reset" class="btn-submit" type="submit">Envoyer le lien</button>
                </form>
                <div class="login-footer">
                    <a href="#" id="link-back-login">← Retour à la connexion</a>
                </div>
            </div>
        </section>
    </main>
</div>

<script type="module">
    import { supabase } from '/espace-client/auth.js';

    const isLocal = ['localhost', '127.0.0.1'].includes(window.location.hostname);
    const redirectTo = isLocal
        ? `${window.location.origin}/espace-client/index.html`
        : 'https://khypnos.fr/espace-client/index.html';

    // ── Navigation entre vues ──
    document.getElementById('link-forgot').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('view-login').classList.remove('active');
        document.getElementById('view-reset').classList.add('active');
    });

    document.getElementById('link-back-login').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('view-reset').classList.remove('active');
        document.getElementById('view-login').classList.add('active');
    });

    // ── Login email/password ──
    const $loginMsg = document.getElementById('login-message');
    const $btnLogin = document.getElementById('btn-login');

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        $btnLogin.disabled = true;
        $btnLogin.textContent = 'Connexion…';
        $loginMsg.className = 'form-message';

        const { error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
            $loginMsg.textContent = 'Email ou mot de passe incorrect.';
            $loginMsg.className = 'form-message error';
            $btnLogin.disabled = false;
            $btnLogin.textContent = 'Se connecter';
        } else {
            window.location.href = redirectTo;
        }
    });

    // ── Reset password ──
    const $resetMsg = document.getElementById('reset-message');
    const $btnReset = document.getElementById('btn-reset');

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('reset-email').value.trim();

        $btnReset.disabled = true;
        $btnReset.textContent = 'Envoi…';
        $resetMsg.className = 'form-message';

        const { error } = await supabase.auth.resetPasswordForEmail(email, {
            redirectTo: isLocal
                ? 'http://127.0.0.1:5500/reset-password.html'
                : 'https://khypnos.fr/reset-password.html'
        });

        $btnReset.disabled = false;
        $btnReset.textContent = 'Envoyer le lien';

        if (error) {
            $resetMsg.textContent = "Erreur lors de l'envoi. Réessaie.";
            $resetMsg.className = 'form-message error';
        } else {
            $resetMsg.textContent = '✉️ Lien envoyé ! Vérifie ta boîte mail (et les spams).';
            $resetMsg.className = 'form-message success';
        }
    });
</script>

<script src="/js/header-manager.js" defer></script>
<script src="/js/scroll-to-top.min.js"></script>
<script src="/js/navbar.js"></script>
<script src="/js/footer-manager.js" defer></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        new FooterManager({
            anchor: '.container',
            position: 'beforeend'
        }).init();
    });
</script>
</body>
</html>
