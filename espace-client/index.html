<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khypnos — Mon espace</title>
    <meta name="description" content="Espace privé Khypnos — accédez à votre vidéothèque et vos ressources de formation.">
    <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" sizes="any">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/css/theme-elegance.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>

<div class="container">
    <main class="dashboard-wrapper">
        <div id="app">
            <div class="loading-state">
                <div class="spinner" aria-hidden="true"></div>
                <span>Chargement de ton espace…</span>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { requireAuth } from '/espace-client/auth.js';

    const SUPABASE_URL = 'https://fbxiynomlxrjasbbcipp.supabase.co';

    const session = await requireAuth();
    if (!session) throw new Error('Non authentifié');

    const res = await fetch(`${SUPABASE_URL}/functions/v1/get-dashboard`, {
        headers: { Authorization: `Bearer ${session.access_token}` }
    });

    if (!res.ok) {
        window.location.href = '/login.html?error=access_denied';
        throw new Error('Accès refusé');
    }

    const { nom, planLabels, hasVideo, sections } = await res.json();
    const app = document.getElementById('app');

    const planTagsHTML = planLabels
        .map(label => `<span class="plan-tag">${label}</span>`)
        .join('');

    const videoCardHTML = hasVideo ? `
        <section class="video-access-card" aria-labelledby="vac-title">
            <div class="vac-left">
                <div class="vac-icon" aria-hidden="true">🎬</div>
                <h2 id="vac-title">Vidéothèque</h2>
                <p>Retrouve toutes les vidéos de cours associées à ta formule.</p>
            </div>
            <a class="btn-videotheque" href="/espace-client/videotheque.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
                Accéder
            </a>
        </section>
    ` : '';

    app.innerHTML = `
        <header class="dashboard-header">
            <h1>Bonjour ${nom} 👋</h1>
            <p>Voici les ressources privées liées à ton abonnement.</p>
            <div class="plan-tags">${planTagsHTML}</div>
        </header>
        ${videoCardHTML}
        <div class="notion-sections" id="infos-sections"></div>
    `;

    const infosEl = document.getElementById('infos-sections');
    if (!sections.length) {
        infosEl.innerHTML = `<p class="notion-empty-state">Ton abonnement donne accès uniquement à la vidéothèque.</p>`;
    } else {
        infosEl.innerHTML = sections.map(section => `
            <a class="notion-link-card" href="${section.notionUrl}" target="_blank" rel="noopener">
                <div class="nlc-left">
                    <div class="nlc-icon" aria-hidden="true">📋</div>
                    <div>
                        <div class="nlc-label">${section.label}</div>
                        <div class="nlc-sub">Ouvrir dans Notion →</div>
                    </div>
                </div>
                <svg class="nlc-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </a>
        `).join('');
    }
</script>

<script src="/js/header-manager.js" defer></script>
<script src="/js/scroll-to-top.min.js"></script>
<script src="/js/navbar.js"></script>
<script src="/js/footer-manager.js" defer></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        new FooterManager({
            anchor: '.container',
            position: 'beforeend'
        }).init();
    });
</script>
</body>
</html>
