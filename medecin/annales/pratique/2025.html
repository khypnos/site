 </li>\n\t<li>Un bilan biologique comprenant une NFS avec hémoglobine à 9.6 g/dL, une ferritine à 85 ng/mL et un coefficient de saturation à 15%, un bilan d'hémostase normal et un ionogramme sanguin normal. </li>\n\t<li>L'albuminémie est mesurée à 26 g/L pour une protidémie à 75g/L avec une pré-albuminémie à 0,1 g/L. </li>\n\t<li>Le débit de filtration glomérulaire est estimé à 110 mL/min </li>\n\t<li>Bilan EFS: Groupe sanguin AB+ </li>\n</ul>",
