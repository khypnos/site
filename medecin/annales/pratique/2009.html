    "year": 2009,
    "type": "pratique",
    "title": "Epreuve pratique 2009 • EVC Anesthésie-Réanimation",
    "sections": [
        {
            "title": "Cas Clinique",
            "body": "<strong>Vous êtes médecin au SAMU et vous avez été appelé pour prendre en charge un patient de 23 ans qui a pris son scooter et qui est retrouvé sur la voie publique. À votre arrivée, le patient casqué est retrouvé dans le coma les yeux fermés non réactif, sans réponse verbale, ni motrice, avec un traumatisme maxillo-facial associé à une épistaxis.</strong>",
            "questions": [
                {
                    "text": "Quel est le score de Glasgow du patient ? Précisez les éléments du score permettant de le calculer ?"
                },
                {
                    "text": "Ce patient est un traumatisé crânien. Quels sont les déterminants de l'apport en oxygène au cerveau ? Donner la formule du contenu artériel en oxygène ? Comment réduire la consommation en oxygène du cerveau."
                },
                {
                    "text": "Décrire à l'aide d'un schéma la relation du débit sanguin cérébral (DSC) en fonction de la pression artérielle moyenne (PAM). Nommez cette relation entre le DSC et la PAM. Donnez l'équation de la pression de perfusion cérébrale (PPC)."
                },
                {
                    "text": "Énumérez les ACSOS (agressions cérébrales secondaires d'origine systémique) à prévenir chez ce patient."
                },
                {
                    "text": "Quels sont les éléments paracliniques spécifiques pour la surveillance à visée cérébrale ?"
                },
                {
                    "text": "Énumérez les principales classes de solutés de remplissage et leurs principaux effets indésirables."
                },
                {
                    "text": "Quels sont les effets des agents anesthésiques suivants sur le DSC et la consommation d'oxygène du cerveau : Propofol, Étomidate, Thiopental, Kétamine, Midazolam"
                },
                {
                    "text": "Ce patient est mis sous noradrénaline. Citez les propriétés de la noradrénaline sur le cœur et les vaisseaux, en précisant les récepteurs impliqués."
                },
                {
                    "text": "Le patient est ventilé avec une FiO2 à 60 % et une PEP à 5 cmH2O. Sa PaO2 est à 100 mmHg (13 KPa) et sa PaCO2 à 55 mmHg (7 KPa). Le pH est de 7,32 et les bicarbonates à 27 mEq/L. La fréquence respiratoire est de 12/min et son volume courant est de 500 mL. Interprétez les gaz du sang et proposer une modification des réglages du respirateur."
                }
            ]
        }
    ]
};
