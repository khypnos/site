<script>
window.ANNALE = {
    "year": 2017,
    "type": "pratique",
    "title": "Epreuve pratique 2017 • EVC Anesthésie-Réanimation",
    "sections": [
        {
            "title": "Cas Clinique",
            "body": "<strong>Vous voyez en consultation d’anesthésie une femme de 45 ans 160 cm 130 kg, HTA tt par ramipril, AC/FA de découverte fortuite il y a 3 mois sous apixaban, pour chirurgie de réduction gastrique (Sleeve gastrectomie)</strong>",
            "questions": [
                {
                    "text": "Calculez son indice de masse corporelle."
                },
                {
                    "text": "Prescrivez-vous des examens complémentaires en pré-opératoire ? Si oui le(s)quel(s)"
                },
                {
                    "text": "Décrire les modalités de gestion pré-opératoire du traitement anti-hypertenseur"
                },
                {
                    "text": "Décrire les modalités de gestion pré-opératoire du traitement anticoagulant"
                },
                {
                    "text": "Décrire par ordre chronologique les modalités de monitorage et de contrôle des voies aériennes supérieures avant intubation (drogues anesthésiques exclus) ?"
                },
                {
                    "text": "Quelles sont les règles de l'antibioprophylaxie pour cette patiente ?"
                },
                {
                    "text": "Vous décidez de faire une induction par propofol et succinyl-choline. Donner la posologie (en mg) des médicaments que vous utilisez pour cette patiente ?"
                },
                {
                    "text": "Vous envisagez une intubation potentiellement difficile. Quels moyens utilisez-vous pour faciliter l'intubation ?"
                },
                {
                    "text": "Vous avez décidé de ventiler le patient en volume contrôlé durant la chirurgie. Précisez les paramètres de réglage du ventilateur."
                },
                {
                    "text": "Vous envisagez d'extuber le patient en fin d'intervention. Quels sont vos critères d'extubation ?"
                },
                {
                    "text": "A J4, votre patient est confuse. Le pouls est à 120 bpm, la TA à 150/90 mmHg et la température est à 38°5. La SpO2 est à 85%. Quels diagnostics évoquez-vous ?"
                },
                {
                    "text": "Vous décidez de la transférer en réanimation. Le diagnostic de choc septique est retenu. Quelles sont les premières mesures que vous mettez en œuvre ?"
                },
                {
                    "text": "A J3, la patiente est intubée, ventilée et sédatée par midazolam et sufetanyl. Elle présente une PaO2 à 85 mmHg sous FiO2 100%. Le diagnostic de SDRA est retenu. Que pouvez-vous faire pour améliorer les échanges gazeux ?"
                }
            ]
        }
    ]
};
</script>
