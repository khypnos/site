            "title": "Cas Clinique",
            "body": "<strong>\nVous prenez en charge un homme de 28 ans, motard victime d’un accident à vitesse élevée.<br>\nVous êtes médecin en salle d’accueil des urgences vitales de votre hôpital (déchocage). Le médecin régulateur du SAMU vous informe de son arrivée par la Structure Mobile d’Urgence et de Réanimation. Le bilan initial met en évidence un patient conscient (Score de Glasgow à 14), pression artérielle 100/65 mmHg, fréquence cardiaque à&nbsp; 110/min, SPo2&nbsp; à 95% sous O2 au masque facial à 5 L/min. Il mobilise ses membres inférieurs spontanément. Il présente une déformation importante de l’extrémité inférieure du fémur&nbsp; gauche et un abdomen globalement douloureux avec une douleur élective à la pression&nbsp; prudente des dernières côtes à gauche. Une voie veineuse périphérique de 18 Gauge a été posée et 500mL de sérum salé à 0,9% est en cours. Il a reçu 1 gramme ivl de paracétamol. Le patient est installé dans votre salle d’accueil. Il présente un poids de 70 Kg pour 1m80.\n</strong>",
            "questions": [
                {
                    "text": "Quelle est votre prise en charge clinique et para-clinique à l’arrivé du patient ?"
                },
                {
                    "text": "20 minutes après son arrivée, vous constatez une désaturation à 85 % malgré une augmentation de l’oxygénothérapie à 8L/min. La fréquence respiratoire est  à 35 /min et la fréquence cardiaque à 130 /min. La pression artérielle est à 95/65 mmHg. L’ hémoglobine capillaire est à 9 g/dl. Il existe un silence auscultatoire à gauche.\n<br>\nDonnez les étiologies possibles de cette défaillance respiratoire"
                },
                {
                    "text": "La SpO2 chute à 80%. Vous décidez de pratiquer une intubation trachéale. Décrivez précisément votre procédure. Donnez les réglages du respirateur ?"

                    "text": "Après l’intubation, la situation respiratoire se stabilise. La SpO2 est remontée à 98%. Malgré 2 litres d’un soluté de remplissage, la pression artérielle chute à 85/60 mmHg. L’hémoglobine capillaire est à 6 g/dl. Le bilan radiologique confirme une fracture de la diaphyse fémorale. La TDM retrouve une contusion pulmonaire gauche majeure sans épanchement pleural, un épanchement abondant dans le péritoine et une fracture de rate avec extravasation de produit de contraste. Il est décidé de l’emmener au bloc opératoire.\n<br>\nQuelle priorité faut-il donner pour la prise en charge des lésions?\n<br>\nDécrivez la prise en charge per-opératoire que vous proposez à ce patient"
                },

                },
