            "body": "<strong>Un patient âgé de 75 ans, 80 kg, 175 cm, ayant comme antécédents un infarctus du myocarde en 2005, une insuffisance cardiaque chronique (NYHA 3), une insuffisance rénale chronique (créatininémie à 220 µmol/L), un diabète non insulino-dépendant sous régime seul, doit bénéficier d'une endartérectomie carotidienne droite pour une sténose symptomatique (accident ischémique transitoire 1 mois auparavant).</strong><br><br>\n<strong>Traitement :</strong> bisoprolol 5 mg/jour (matin), aspirine 160 mg (midi), ramipril 2,5 mg (le soir), atorvastatine 40 mg (le soir).",
