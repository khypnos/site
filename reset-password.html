<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khypnos — Nouveau mot de passe</title>
    <meta name="description" content="Définis un nouveau mot de passe pour ton compte Khypnos.">
    <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" sizes="any">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/css/theme-elegance.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="container">
    <main class="login-wrapper">
        <section class="login-card" aria-labelledby="reset-title">
            <div class="lock-badge" aria-hidden="true">🔑</div>
            <h1 id="reset-title">Nouveau mot de passe</h1>
            <p class="subtitle">Choisis un mot de passe sécurisé pour ton compte.</p>

            <form id="reset-form" novalidate>
                <div class="form-group">
                    <label for="password">Nouveau mot de passe</label>
                    <input id="password" type="password" placeholder="••••••••" autocomplete="new-password" required>
                    <p class="hint">8 caractères minimum</p>
                </div>
                <div class="form-group">
                    <label for="password-confirm">Confirmer le mot de passe</label>
                    <input id="password-confirm" type="password" placeholder="••••••••" autocomplete="new-password" required>
                </div>
                <div id="message" class="form-message" role="alert" aria-live="polite"></div>
                <button id="btn-submit" class="btn-submit" type="submit">Enregistrer le mot de passe</button>
            </form>
        </section>
    </main>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
        'https://fbxiynomlxrjasbbcipp.supabase.co',
        'sb_publishable_1R_hEWSnFLiy-wpPdvrahw_AxMIg8bJ'
    );

    const $form   = document.getElementById('reset-form');
    const $msg    = document.getElementById('message');
    const $btn    = document.getElementById('btn-submit');
    const $pw     = document.getElementById('password');
    const $pwConf = document.getElementById('password-confirm');

    // Supabase envoie le token dans le hash (#access_token=...&type=recovery)
    // Le SDK le détecte automatiquement via onAuthStateChange
    supabase.auth.onAuthStateChange((event) => {
        if (event === 'PASSWORD_RECOVERY') {
            console.log('Token de récupération valide');
        }
    });

    $form.addEventListener('submit', async (e) => {
        e.preventDefault();
        $msg.className = 'form-message';

        const pw     = $pw.value;
        const pwConf = $pwConf.value;

        if (pw.length < 8) {
            $msg.textContent = 'Le mot de passe doit contenir au moins 8 caractères.';
            $msg.className = 'form-message error';
            return;
        }
        if (pw !== pwConf) {
            $msg.textContent = 'Les deux mots de passe ne correspondent pas.';
            $msg.className = 'form-message error';
            return;
        }

        $btn.disabled = true;
        $btn.textContent = 'Enregistrement…';

        const { error } = await supabase.auth.updateUser({ password: pw });

        if (error) {
            $msg.textContent = 'Erreur : ' + error.message;
            $msg.className = 'form-message error';
            $btn.disabled = false;
            $btn.textContent = 'Enregistrer le mot de passe';
        } else {
            $msg.textContent = '✅ Mot de passe mis à jour ! Redirection…';
            $msg.className = 'form-message success';
            setTimeout(() => {
                window.location.href = '/espace-client/index.html';
            }, 2000);
        }
    });
</script>

<script src="/js/header-manager.js" defer></script>
<script src="/js/scroll-to-top.min.js"></script>
<script src="/js/navbar.js"></script>
<script src="/js/footer-manager.js" defer></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        new FooterManager({
            anchor: '.container',
            position: 'beforeend'
        }).init();
    });
</script>
</body>
</html>
