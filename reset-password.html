<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khypnos — Nouveau mot de passe</title>
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" sizes="any">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .login-wrapper {
      min-height: calc(100vh - 160px);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }
    .login-card {
      width: 100%; max-width: 420px;
      background: #fff;
      border: 1px solid #ececf1;
      border-radius: 16px;
      padding: 2.25rem 2rem;
      box-shadow: 0 1px 2px rgba(16,24,40,.04), 0 8px 24px rgba(16,24,40,.08);
    }
    .lock-badge {
      width: 48px; height: 48px; border-radius: 50%;
      background: #f4f4f8;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem; font-size: 1.25rem;
    }
    h1 { font-size: 1.4rem; font-weight: 600; text-align: center; margin: 0 0 .35rem; color: #1a1a2e; }
    .subtitle { text-align: center; color: #6b7280; font-size: .95rem; margin: 0 0 1.75rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: .35rem; font-size: .875rem; font-weight: 500; color: #374151; }
    .form-group input {
      width: 100%; padding: .75rem .9rem;
      border: 1px solid #e5e7eb; border-radius: 10px;
      font-size: .95rem; font-family: inherit; box-sizing: border-box;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-group input:focus { outline: none; border-color: #1a1a2e; box-shadow: 0 0 0 3px rgba(26,26,46,.12); }
    .btn-submit {
      width: 100%; padding: .8rem 1rem;
      border-radius: 10px; border: none;
      background: #1a1a2e; color: #fff;
      font-size: .95rem; font-weight: 500;
      cursor: pointer; font-family: inherit;
      transition: background .15s; margin-top: .5rem;
    }
    .btn-submit:hover { background: #2a2a45; }
    .btn-submit:disabled { background: #9ca3af; cursor: not-allowed; }
    .form-message {
      margin-top: .75rem; padding: .75rem .9rem;
      border-radius: 10px; font-size: .9rem; display: none;
    }
    .form-message.error   { display: block; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .form-message.success { display: block; background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .hint { font-size: .8rem; color: #9ca3af; margin-top: .4rem; }
  </style>
</head>
<body>
  <div class="container">
    <main class="login-wrapper">
      <section class="login-card">
        <div class="lock-badge">🔑</div>
        <h1>Nouveau mot de passe</h1>
        <p class="subtitle">Choisis un mot de passe sécurisé pour ton compte.</p>

        <form id="reset-form" novalidate>
          <div class="form-group">
            <label for="password">Nouveau mot de passe</label>
            <input id="password" type="password" placeholder="••••••••" autocomplete="new-password" required />
            <p class="hint">8 caractères minimum</p>
          </div>
          <div class="form-group">
            <label for="password-confirm">Confirmer le mot de passe</label>
            <input id="password-confirm" type="password" placeholder="••••••••" autocomplete="new-password" required />
          </div>
          <div id="message" class="form-message"></div>
          <button id="btn-submit" class="btn-submit" type="submit">Enregistrer le mot de passe</button>
        </form>
      </section>
    </main>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabase = createClient(
      'https://fbxiynomlxrjasbbcipp.supabase.co',
      'sb_publishable_1R_hEWSnFLiy-wpPdvrahw_AxMIg8bJ'
    )

    const $form    = document.getElementById('reset-form')
    const $msg     = document.getElementById('message')
    const $btn     = document.getElementById('btn-submit')
    const $pw      = document.getElementById('password')
    const $pwConf  = document.getElementById('password-confirm')

    // Supabase envoie le token dans le hash de l'URL (#access_token=...&type=recovery)
    // Le SDK le détecte automatiquement via onAuthStateChange
    const { data: { subscription } } = supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // Token valide — on laisse l'utilisateur saisir son nouveau mot de passe
        console.log('Token de récupération valide')
      }
    })

    $form.addEventListener('submit', async (e) => {
      e.preventDefault()
      $msg.className = 'form-message'

      const pw     = $pw.value
      const pwConf = $pwConf.value

      if (pw.length < 8) {
        $msg.textContent = 'Le mot de passe doit contenir au moins 8 caractères.'
        $msg.className = 'form-message error'
        return
      }
      if (pw !== pwConf) {
        $msg.textContent = 'Les deux mots de passe ne correspondent pas.'
        $msg.className = 'form-message error'
        return
      }

      $btn.disabled = true
      $btn.textContent = 'Enregistrement…'

      const { error } = await supabase.auth.updateUser({ password: pw })

      if (error) {
        $msg.textContent = 'Erreur : ' + error.message
        $msg.className = 'form-message error'
        $btn.disabled = false
        $btn.textContent = 'Enregistrer le mot de passe'
      } else {
        $msg.textContent = '✅ Mot de passe mis à jour ! Redirection…'
        $msg.className = 'form-message success'
        setTimeout(() => { window.location.href = '/espace-client/index.html' }, 2000)
      }
    })
  </script>

  <script src="/js/header-manager.js" defer></script>
  <script src="/js/scroll-to-top.min.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/footer-manager.js"></script>

	<script>
		document.addEventListener('DOMContentLoaded', () => {
			new FooterManager({
				anchor: '.container',
				position: 'beforeend'
			}).init();
		});
	</script>

</body>
</html>
